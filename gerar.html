<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador ProvouComprou - CupomClic</title>
  <style>
    :root {
      --bg-color: #0d131a;
      --card-bg: #151d27;
      --input-bg: #0b0f14;
      --border-color: #243242;
      --text-main: #f0f4f8;
      --text-muted: #94a3b8;
      --accent-gold: #e69c5e;
      --accent-blue: #38bdf8;
      --accent-green: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
    .container { width: 100%; max-width: 650px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); margin-top: 10px; }
    
    .logo-container { text-align: center; margin-bottom: 15px; }
    .logo-img { max-width: 200px; width: 100%; height: auto; border-radius: 8px; display: inline-block; }

    h1 { color: var(--accent-gold); font-size: 1.4rem; text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    p.subtitle { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px; }
    
    .form-group { margin-bottom: 18px; background: var(--input-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
    label { display: block; font-size: 0.85rem; font-weight: bold; color: var(--accent-blue); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
    
    .file-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .btn-upload { background: #1e293b; border: 1px solid #334155; color: var(--text-main); padding: 12px 8px; border-radius: 8px; text-align: center; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-upload:hover { border-color: var(--accent-gold); }
    
    input[type="file"] { display: none; }
    .preview-filename { font-size: 0.8rem; color: var(--accent-green); margin-top: 8px; display: none; text-align: center; font-weight: bold; }

    input[type="text"], input[type="url"], select { width: 100%; padding: 12px; background: var(--card-bg); border: 1px solid #1e3a5f; border-radius: 8px; color: var(--text-main); font-size: 0.95rem; outline: none; }
    input:focus, select:focus { border-color: var(--accent-gold); }

    .divider { text-align: center; color: var(--text-muted); font-size: 0.75rem; margin: 8px 0; font-weight: bold; }

    .btn-main { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent-gold), #c47c3e); border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
    .btn-main:hover { opacity: 0.95; }
    .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

    .result-box { margin-top: 25px; background: #0f1e2e; border: 1px dashed var(--accent-green); padding: 20px; border-radius: 12px; display: none; text-align: center; }
    .result-title { color: var(--accent-green); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
    
    .generated-url { background: var(--input-bg); padding: 12px; border-radius: 8px; word-break: break-all; font-family: monospace; font-size: 0.85rem; color: var(--accent-blue); margin-bottom: 15px; border: 1px solid var(--border-color); }

    .btn-action { display: inline-block; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 1rem; margin-top: 8px; cursor: pointer; border: none; }
    .btn-whatsapp { background: #25d366; color: #fff; }
    .btn-copy { background: #38bdf8; color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="logo.png" alt="CupomClic" class="logo-img">
    </div>

    <h1>💼 PAINEL DO LOJISTA</h1>
    <p class="subtitle">Crie links exclusivos de Provador Virtual acoplados ao CupomClic</p>

    <!-- 1. NOME DA LOJA -->
    <div class="form-group">
      <label>1. NOME DA SUA LOJA:</label>
      <input type="text" id="nomeLoja" placeholder="Ex: Boutique Elegance">
    </div>

    <!-- 2. FOTO DA ROUPA -->
    <div class="form-group">
      <label>2. FOTO DA PEÇA DE ROUPA (URL DA IMAGEM DO PRODUTO):</label>
      <input type="url" id="fotoRoupaUrl" placeholder="https://sualoja.com/fotos/vestido.jpg" oninput="limparArquivoLocal()">
      
      <div class="divider">OU SELECIONE DO SEU DISPOSITIVO (FOTO COMPACTADA)</div>
      <div class="file-buttons">
        <label for="roupaCam" class="btn-upload">📸 Tirar Foto</label>
        <label for="roupaFile" class="btn-upload">📁 Galeria / Arquivo</label>
      </div>
      <input type="file" id="roupaCam" accept="image/*" capture="environment" onchange="atualizarFotoRoupa(this)">
      <input type="file" id="roupaFile" accept="image/*" onchange="atualizarFotoRoupa(this)">
      <div id="statusRoupa" class="preview-filename"></div>
    </div>

    <!-- 3. CATEGORIA -->
    <div class="form-group">
      <label>3. TIPO DA PEÇA DE ROUPA:</label>
      <select id="categoriaSelect">
        <option value="dresses">👗 Peça Única / Vestidos / Macacões</option>
        <option value="upper_body">👔 Parte de Cima (Camisas, Blusas, Jaquetas)</option>
        <option value="lower_body">👖 Parte de Baixo (Calças, Bermudas, Saias)</option>
      </select>
    </div>

    <!-- 4. LINK DO CUPOMCLIC -->
    <div class="form-group">
      <label>4. LINK DO CUPOMCLIC (OFERTA / CHECKOUT):</label>
      <input type="url" id="linkCupomClic" placeholder="https://cupomclic.com/oferta/12345">
    </div>

    <!-- 5. TEMPO DE VALIDADE DO LINK -->
    <div class="form-group">
      <label>5. VALIDADE DO LINK DESTA OFERTA:</label>
      <select id="validadeSelect">
        <option value="15">⏳ 15 Minutos (Urgência Alta)</option>
        <option value="30">⏳ 30 Minutos</option>
        <option value="60" selected>⏳ 1 Hora (Recomendado)</option>
        <option value="180">⏳ 3 Horas</option>
        <option value="1440">⏳ 24 Horas (1 Dia)</option>
      </select>
    </div>

    <button id="btnGerar" class="btn-main" onclick="gerarLinkOferta()">⚡ Gerar Link ProvouComprou</button>

    <!-- RESULTADO -->
    <div id="resultBox" class="result-box">
      <div class="result-title">🎉 Link Exclusivo Gerado com Sucesso!</div>
      <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;">Envie para a cliente provar no corpo antes de comprar:</p>
      
      <div id="urlGerada" class="generated-url"></div>

      <button class="btn-action btn-copy" onclick="copiarLink()">📋 Copiar Link da Oferta</button>
      <a id="btnWhatsApp" class="btn-action btn-whatsapp" href="#" target="_blank" style="margin-top: 10px; display: block; text-align: center;">💬 Enviar no WhatsApp da Cliente</a>
    </div>
  </div>

  <script>
    let arquivoRoupaLocal = null;
    let linkFinalGlobal = '';

    function atualizarFotoRoupa(input) {
      if (input.files && input.files[0]) {
        arquivoRoupaLocal = input.files[0];
        document.getElementById('fotoRoupaUrl').value = '';
        const status = document.getElementById('statusRoupa');
        status.innerText = '✅ Foto da roupa selecionada: ' + input.files[0].name;
        status.style.display = 'block';
      }
    }

    function limparArquivoLocal() {
      arquivoRoupaLocal = null;
      document.getElementById('statusRoupa').style.display = 'none';
    }

    function comprimirImagemExtrema(file, maxWidth = 500, quality = 0.5) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            resolve(canvas.toDataURL('image/jpeg', quality));
          };
        };
      });
    }

    async function gerarLinkOferta() {
      const btn = document.getElementById('btnGerar');
      const loja = encodeURIComponent(document.getElementById('nomeLoja').value.trim());
      const urlInput = document.getElementById('fotoRoupaUrl').value.trim();
      const categoria = document.getElementById('categoriaSelect').value;
      const linkCupom = encodeURIComponent(document.getElementById('linkCupomClic').value.trim());
      const validadeMinutos = parseInt(document.getElementById('validadeSelect').value);

      let urlRoupaFinal = '';

      btn.disabled = true;
      btn.innerText = '⏳ Montando link da oferta...';

      try {
        if (urlInput !== '') {
          urlRoupaFinal = urlInput;
        } else if (arquivoRoupaLocal) {
          urlRoupaFinal = await comprimirImagemExtrema(arquivoRoupaLocal);
        } else {
          alert('Por favor, informe a URL da foto da roupa ou tire uma foto!');
          btn.disabled = false;
          btn.innerText = '⚡ Gerar Link ProvouComprou';
          return;
        }

        const expiraEm = Date.now() + (validadeMinutos * 60 * 1000);
        const baseUrl = window.location.origin + '/index.html';
        
        // Link limpo apenas com o essencial
        const linkFinal = `${baseUrl}?loja=${loja}&roupa=${encodeURIComponent(urlRoupaFinal)}&categoria=${categoria}&link=${linkCupom}&expira=${expiraEm}`;
        linkFinalGlobal = linkFinal;

        document.getElementById('urlGerada').innerText = linkFinal;
        
        const mensagemWhatsApp = `Olá! Mandei essa oferta exclusiva para você! 👗✨\n\nProve este modelo no seu corpo agora pelo nosso Provador Virtual do CupomClic (Oferta por tempo limitado):\n👉 ${linkFinal}`;
        
        document.getElementById('btnWhatsApp').href = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagemWhatsApp)}`;
        document.getElementById('resultBox').style.display = 'block';

      } catch (err) {
        console.error(err);
        alert('Erro ao gerar o link.');
      } finally {
        btn.disabled = false;
        btn.innerText = '⚡ Gerar Link ProvouComprou';
      }
    }

    function copiarLink() {
      if (!linkFinalGlobal) return;
      navigator.clipboard.writeText(linkFinalGlobal);
      alert('Link copiado com sucesso!');
    }
  </script>
</body>
</html>
