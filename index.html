<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProvouComprou - CupomClic</title>
  <style>
    :root {
      --bg-color: #0d131a;
      --card-bg: #151d27;
      --input-bg: #0b0f14;
      --border-color: #243242;
      --text-main: #f0f4f8;
      --text-muted: #94a3b8;
      --accent-gold: #e69c5e;
      --accent-blue: #38bdf8;
      --accent-green: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
    .container { width: 100%; max-width: 650px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); margin-top: 10px; }
    
    .logo-container { text-align: center; margin-bottom: 15px; }
    .logo-img { max-width: 200px; width: 100%; height: auto; border-radius: 8px; display: inline-block; }

    /* CARD DE OFERTA EXCLUSIVA */
    .offer-card { background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(56, 189, 248, 0.15)); border: 1px solid var(--accent-green); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
    .offer-title { font-size: 1.1rem; color: var(--accent-green); font-weight: bold; margin-bottom: 5px; }
    .offer-details { font-size: 0.9rem; color: var(--text-main); }
    .coupon-badge { display: inline-block; background: var(--accent-green); color: #000; font-weight: bold; padding: 3px 8px; border-radius: 6px; font-size: 0.85rem; margin-top: 5px; }

    h1 { color: var(--accent-gold); font-size: 1.4rem; text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    p.subtitle { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }
    
    .form-group { margin-bottom: 18px; background: var(--input-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
    label { display: block; font-size: 0.85rem; font-weight: bold; color: var(--accent-blue); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
    
    .file-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-upload { background: #1e293b; border: 1px solid #334155; color: var(--text-main); padding: 12px 8px; border-radius: 8px; text-align: center; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-upload:hover { border-color: var(--accent-gold); }
    
    input[type="file"] { display: none; }
    .preview-filename { font-size: 0.8rem; color: var(--accent-green); margin-top: 8px; display: none; text-align: center; font-weight: bold; }

    select, input[type="text"] { width: 100%; padding: 12px; background: var(--card-bg); border: 1px solid #1e3a5f; border-radius: 8px; color: var(--text-main); font-size: 0.95rem; outline: none; }
    
    .btn-main { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent-gold), #c47c3e); border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
    .btn-main:hover { opacity: 0.95; }
    .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

    .loading-box { display: none; text-align: center; padding: 25px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; margin-top: 25px; }
    .spinner { width: 45px; height: 45px; border: 4px solid var(--border-color); border-top: 4px solid var(--accent-gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { font-size: 0.95rem; color: var(--accent-gold); font-weight: bold; }
    .loading-subtext { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }

    .results-container { margin-top: 25px; display: none; text-align: center; }
    .img-preview { width: 100%; max-width: 450px; border-radius: 12px; border: 2px solid var(--accent-gold); margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
    
    .btn-buy { display: block; width: 100%; text-align: center; background: var(--accent-green); color: #000; padding: 16px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 1.1rem; margin-top: 10px; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
    .btn-download { display: inline-block; width: 100%; text-align: center; background: transparent; color: var(--text-muted); padding: 10px; border-radius: 8px; font-size: 0.85rem; text-decoration: underline; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="logo.png" alt="CupomClic" class="logo-img">
    </div>

    <!-- BANNER DE OFERTA CARREGADO VIA URL -->
    <div id="cardOferta" class="offer-card" style="display: none;">
      <div id="tituloOferta" class="offer-title">🎁 Oferta Exclusiva para Você!</div>
      <div id="detalhesOferta" class="offer-details"></div>
    </div>

    <h1>✨ PROVOU, COMPROU!</h1>
    <p class="subtitle">Veja como esta peça fica no seu corpo agora mesmo</p>

    <!-- ETAPA 1: FOTO DA CLIENTE -->
    <div class="form-group">
      <label>1. TIRE OU SELECIONE UMA FOTO SUA:</label>
      <div class="file-buttons">
        <label for="clienteCam" class="btn-upload">📸 Abrir Câmera</label>
        <label for="clienteFile" class="btn-upload">📁 Galeria / Fotos</label>
      </div>
      <input type="file" id="clienteCam" accept="image/*" capture="user" onchange="atualizarCliente(this)">
      <input type="file" id="clienteFile" accept="image/*" onchange="atualizarCliente(this)">
      <div id="statusCliente" class="preview-filename"></div>
    </div>

    <!-- ETAPA 2: ROUPA (AUTO-PREENCHIDA SE VIER VIA URL) -->
    <div id="grupoFotoRoupa" class="form-group">
      <label>2. FOTO DA PEÇA DE ROUPA:</label>
      <div class="file-buttons">
        <label for="roupaCam" class="btn-upload">📸 Tirar Foto</label>
        <label for="roupaFile" class="btn-upload">📁 Galeria / Arquivo</label>
      </div>
      <input type="file" id="roupaCam" accept="image/*" capture="environment" onchange="atualizarRoupa(this)">
      <input type="file" id="roupaFile" accept="image/*" onchange="atualizarRoupa(this)">
      <div id="statusRoupa" class="preview-filename"></div>
    </div>

    <!-- ETAPA 3: CATEGORIA -->
    <div class="form-group">
      <label>3. TIPO DA PEÇA:</label>
      <select id="categoriaSelect">
        <option value="upper_body">👔 Parte de Cima (Camisas, Blusas, Jaquetas)</option>
        <option value="lower_body">👖 Parte de Baixo (Calças, Bermudas, Saias)</option>
        <option value="dresses">👗 Peça Única / Vestidos / Macacões</option>
      </select>
    </div>

    <button id="btnProvar" class="btn-main" onclick="provarEComprar()">⚡ Experimentar em Mim</button>

    <div id="loadingBox" class="loading-box">
      <div class="spinner"></div>
      <div class="loading-text">👗 "Vestindo" a peça no seu corpo...</div>
      <div class="loading-subtext">Ajustando caimento e iluminação. Aguarde uns 10 segundos!</div>
    </div>

    <!-- RESULTADO + BOTÃO COMPRAR -->
    <div id="resultsBox" class="results-container">
      <img id="fotoResultado" class="img-preview" src="" alt="Você Vestindo a Roupa">
      
      <a id="btnComprar" class="btn-buy" href="#" target="_blank">
        🛍️ GOSTEI! COMPRAR AGORA VIA CHECKOUT
      </a>

      <a id="btnDownload" class="btn-download" href="#" download="provou-comprou.jpg" target="_blank">
        ⬇️ Baixar Foto de Exemplo
      </a>
    </div>
  </div>

  <script>
    let arquivoCliente = null;
    let arquivoRoupaPayload = null; // Pode ser arquivo ou URL string
    let linkCheckoutFinal = '#';

    // LÊ PARÂMETROS DA URL AO CARREGAR A PÁGINA
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      
      const roupaUrl = urlParams.get('roupa');
      const preco = urlParams.get('preco');
      const cupom = urlParams.get('cupom');
      const loja = urlParams.get('loja');
      const categoria = urlParams.get('categoria');
      const linkCheckout = urlParams.get('link');

      if (linkCheckout) {
        linkCheckoutFinal = decodeURIComponent(linkCheckout);
      }

      // Se o link do WhatsApp já trouxe a foto da roupa
      if (roupaUrl) {
        arquivoRoupaPayload = decodeURIComponent(roupaUrl);
        document.getElementById('grupoFotoRoupa').style.display = 'none'; // Esconde o campo de upload de roupa
      }

      if (categoria) {
        document.getElementById('categoriaSelect').value = categoria;
      }

      // Se vier informações da oferta no link
      if (loja || preco || cupom) {
        const cardOferta = document.getElementById('cardOferta');
        const detalhesOferta = document.getElementById('detalhesOferta');
        
        let html = '';
        if (loja) html += `<b>Loja:</b> ${loja}<br>`;
        if (preco) html += `<b>Valor Especial:</b> R$ ${preco}<br>`;
        if (cupom) html += `<span class="coupon-badge">CUPOM: ${cupom}</span>`;

        detalhesOferta.innerHTML = html;
        cardOferta.style.display = 'block';
      }
    });

    function atualizarCliente(input) {
      if (input.files && input.files[0]) {
        arquivoCliente = input.files[0];
        const status = document.getElementById('statusCliente');
        status.innerText = '✅ Sua foto foi carregada com sucesso!';
        status.style.display = 'block';
      }
    }

    function atualizarRoupa(input) {
      if (input.files && input.files[0]) {
        arquivoRoupaPayload = input.files[0];
        const status = document.getElementById('statusRoupa');
        status.innerText = '✅ Foto da roupa carregada!';
        status.style.display = 'block';
      }
    }

    function comprimirImagem(file, maxWidth = 1024, quality = 0.8) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
            resolve(compressedBase64);
          };
        };
      });
    }

    async function provarEComprar() {
      const categoriaSelect = document.getElementById('categoriaSelect');
      const btn = document.getElementById('btnProvar');
      const loadingBox = document.getElementById('loadingBox');
      const resultsBox = document.getElementById('resultsBox');
      const fotoResultado = document.getElementById('fotoResultado');
      const btnDownload = document.getElementById('btnDownload');
      const btnComprar = document.getElementById('btnComprar');

      if (!arquivoCliente) {
        alert('Por favor, tire ou selecione uma foto sua!');
        return;
      }

      if (!arquivoRoupaPayload) {
        alert('Por favor, selecione a foto da roupa!');
        return;
      }

      btn.disabled = true;
      btn.innerText = '⏳ Processando...';
      resultsBox.style.display = 'none';
      loadingBox.style.display = 'block';

      try {
        const pessoaBase64 = await comprimirImagem(arquivoCliente);
        let roupaFinal = '';

        if (typeof arquivoRoupaPayload === 'string') {
          roupaFinal = arquivoRoupaPayload; // URL vinda da URL
        } else {
          roupaFinal = await comprimirImagem(arquivoRoupaPayload); // Arquivo local
        }

        const res = await fetch('/api/provador', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            human_image: pessoaBase64,
            garment_image: roupaFinal,
            category: categoriaSelect.value,
            description: 'fashion item'
          })
        });

        const data = await res.json();

        if (data.sucesso && data.imageUrl) {
          fotoResultado.src = data.imageUrl;
          btnDownload.href = data.imageUrl;
          btnComprar.href = linkCheckoutFinal;
          resultsBox.style.display = 'block';
        } else {
          alert('Atenção: ' + (data.erro || 'Erro ao processar prova.'));
        }
      } catch (err) {
        console.error('Erro:', err);
        alert('Erro de conexão com o servidor.');
      } finally {
        loadingBox.style.display = 'none';
        btn.disabled = false;
        btn.innerText = '⚡ Experimentar em Mim';
      }
    }
  </script>
</body>
</html>
